<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pomodoro Timer</title>
    <link rel="stylesheet" href="index.css" />
  </head>
  <body>
    <div class="container">
      <h1 class="title">pomodoro</h1>

      <div class="timer-display">
        <span class="time">25:00</span>
      </div>

      <div class="controls">
        <button class="btn btn-start">시작</button>
        <button class="btn btn-stop">정지</button>
        <button class="btn btn-reset">초기화</button>
      </div>

      <a href="setting.html"><button class="btn btn-settings">⚙ 설정</button></a>
    </div>
    <script src="index.js"></script>
  </body>
</html>
