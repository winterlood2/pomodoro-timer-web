<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>Pomodoro - Setting</title>
    <link rel="stylesheet" href="index.css" />
    <link rel="stylesheet" href="setting.css" />
  </head>
  <body>
    <div class="container">
      <h3 class="setting-title">Setting</h3>

      <div class="setting-group">
        <label for="timer-input">타이머 시간 (분)</label>
        <input
          type="number"
          id="timer-input"
          class="timer-input"
          value="25"
          min="1"
          max="60"
        />
      </div>

      <button class="btn btn-save">설정 완료</button>
    </div>
    <script src="setting.js"></script>
  </body>
</html>
